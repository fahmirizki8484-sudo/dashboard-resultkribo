    {n:59, p:'BRUNEI 21', j:'21:45 WIB'}, {n:60, p:'HOKIDRAW 22:00', j:'22:00 WIB'},
    {n:61, p:'POIPET22', j:'22:45 WIB'}, {n:62, p:'HOKIDRAW 23:00', j:'23:00 WIB'},
    {n:63, p:'TOTOMALI 2330', j:'23:30 WIB'}
];

    let currentSesi = '';
    let lastMode = '1p';

    // HELPER: Jam ke Menit untuk perhitungan & sorting
    function timeToMin(timeStr) {
        const parts = timeStr.match(/(\d{2}):(\d{2})/);
        if (!parts) return 0;
        return parseInt(parts[1]) * 60 + parseInt(parts[2]);
    }

    function getShioFromNumber(num) {
        if(!num || num.length < 2) return "......";
        const tail = parseInt(num.substring(num.length - 2));
        const found = shioList.find(s => s.v.includes(tail));
        return found ? found.n.toUpperCase() : "......";
    }

    function toggleSesi(sesi) {
        currentSesi = sesi;
        document.querySelectorAll('.btn-sesi').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${sesi}`).classList.add('active');
        document.getElementById('monitor-area').classList.add('active');
        renderTable();
    }

    function renderTable() {
    const body = document.getElementById('table-body');
    const summary = document.getElementById('summary-info');
    const savedSts = JSON.parse(localStorage.getItem('ziatogel_status') || '{}');
    const savedRes = JSON.parse(localStorage.getItem('ziatogel_results') || '{}');

    // 1. UPDATE JADWAL DARI MEMORI
    const savedJadwal = JSON.parse(localStorage.getItem('ziatogel_custom_jadwal') || '{}');
    dataPasaran.forEach(item => {
        if (savedJadwal[item.n]) { item.j = savedJadwal[item.n]; }
    });

    // 2. FILTER BERDASARKAN SHIFT
    let filtered = dataPasaran.filter(item => {
        const m = timeToMin(item.j);
        if (currentSesi === 'pagi') return m >= 465 && m < 1065; 
        if (currentSesi === 'sore') return (m >= 1065) || (m < 45); 
        if (currentSesi === 'malam') return m >= 45 && m < 465;
        return false;
    });

    // 3. SORTING BERDASARKAN JAM
    filtered.sort((a, b) => {
        let minA = timeToMin(a.j); let minB = timeToMin(b.j);
        if (currentSesi === 'sore') {
            if (minA <= 45) minA += 1440; if (minB <= 45) minB += 1440;
        }
        return minA - minB;
    });

    // 4. CARI TARGET SELANJUTNYA (VERSI LEBIH SENSITIF)
const sekarang = new Date();
const menitSekarang = sekarang.getHours() * 60 + sekarang.getMinutes();
let idNext = null;
let selisihTerkecil = Infinity;

dataPasaran.forEach(item => {
    const isDone = (localStorage.getItem('sts_' + item.n) === "DONE");
    if (!isDone) {
        let mTarget = timeToMin(item.j);
        
        // Penyesuaian tengah malam
        if (menitSekarang > 1200 && mTarget < 300) mTarget += 1440;
        
        let selisih = mTarget - menitSekarang;
        
        // KUNCI: Kita kurangi toleransi jadi 2 menit saja setelah lewat jamnya
        // Dan kita prioritaskan pasaran yang jamnya paling dekat dengan jam sekarang
        if (selisih >= -5 && selisih < selisihTerkecil) {
            selisihTerkecil = selisih;
            idNext = item.n;
        }
    }
});

    let doneCount = 0;
    let totalCount = filtered.length;

    // 5. RENDER KE HTML
    // Tambahkan parameter 'index' di dalam map
body.innerHTML = filtered.map((item, index) => { 
    const isDone = savedSts[item.n] === "DONE";
    if (isDone) doneCount++;
    const isNext = (item.n === idNext);
    const val = savedRes[item.n] || "-";

    return `<tr class="${isNext ? 'next-target' : ''}">
            <td style="${isNext ? 'color:var(--gold); font-weight:bold;' : ''}">${index + 1}</td>
            
            <td class="p-name" style="text-align: left; padding-left: 15px; white-space: nowrap;">
                ${isNext ? '<span class="next-label">NEXT RESULT ⛔️ </span>' : ''} 
                <span style="${isNext ? 'color:var(--gold); font-weight:bold;' : ''}">${item.p}</span>
            </td>

            <td class="res-col">${val}</td>
            
            <td style="color:var(--neon);">
                <div class="edit-jam-wrapper" onclick="editJam(${item.n}, '${item.p}', '${item.j}')" 
                     style="display:inline-flex; align-items:center; gap:5px; cursor:pointer;" title="Klik untuk ubah jam">
                    <span class="jam-text">${item.j}</span>
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:14px; height:14px; stroke:var(--neon);">
                        <path d="M11 4H4C3.46957 4 2.96086 4.21071 2.58579 4.58579C2.21071 4.96086 2 5.46957 2 6V20C2 20.5304 2.21071 21.0391 2.58579 21.4142C2.96086 21.7893 3.46957 22 4 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V13M18.5 2.50001C18.8978 2.10219 19.4374 1.87869 20 1.87869C20.5626 1.87869 21.1022 2.10219 21.5 2.50001C21.8978 2.89784 22.1213 3.4374 22.1213 4.00001C22.1213 4.56262 21.8978 5.10219 21.5 5.50001L12 15L8 16L9 12L18.5 2.50001Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </td>

            <td><span class="sts ${isDone ? 'done' : 'waiting'}">${isDone ? 'DONE' : 'WAITING'}</span></td>
            <td>
                <div style="display:flex; gap:5px; justify-content:center;">
                    <button class="btn-in btn-input" onclick="openM(${item.n}, '${item.p}')">INPUT</button>
                    <button class="btn-in btn-reset-single" style="border-color: var(--red); color: var(--red);" onclick="resetSingle(${item.n})">♻️</button>
                </div>
            </td></tr>`;
}).join('');

    // 6. UPDATE SUMMARY
    let percent = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;
    summary.innerHTML = `
        <div style="display:flex; gap:8px; align-items:center; font-size:20px; background:#1e293b; padding:6px 10px; border-radius:6px; border:2px solid #334155;">
            <span style="color:var(--green); font-weight:bold;">DONE RESULT : ${doneCount} PASARAN </span>
            <span style="color:#64748b;">|</span>
            <span style="color:var(--red); font-weight:bold;">BELUM RESULT : ${totalCount - doneCount} PASARAN </span>
            <span style="color:var(--gold); font-weight:bold;">${percent}%</span>
            <div style="width:80px; height:4px; background:#020617; border-radius:4px; overflow:hidden; margin-left:6px;">
                <div style="width:${percent}%; height:100%; background:var(--neon);"></div>
            </div>
        </div>`;
}

    function editJam(no, nama, jamSekarang) {
        const jamBaru = prompt(`UBAH JADWAL - ${nama}\n\nMasukkan jam baru (Format: HH:mm WIB)\nContoh: 16:45 WIB`, jamSekarang);
        if (jamBaru !== null && jamBaru !== "") {
            let jadwalLama = JSON.parse(localStorage.getItem('ziatogel_custom_jadwal') || '{}');
            jadwalLama[no] = jamBaru;
            localStorage.setItem('ziatogel_custom_jadwal', JSON.stringify(jadwalLama));
            renderTable(); // Otomatis re-sort setelah edit
        }
    }

    // Fungsi lainnya (updateGen, openM, saveM, dll) tetap sama
    function updateGen(mode) {
        if(mode) lastMode = mode;
        const nama = document.getElementById('in-nama').value.toUpperCase(); 
        if(!nama) return;
        const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
        const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const d = new Date();
        const tglString = `HARI ${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        let shio = "......", out = "";

        if(lastMode === '3p') {
            const p1 = document.getElementById('p1').value || "";
            const p2 = document.getElementById('p2').value || "";
            const p3 = document.getElementById('p3').value || "";
            shio = getShioFromNumber(p1);
            document.getElementById('in-shio').value = shio;
            out = `Hasil Pengeluaran ${nama}\n${tglString}\nPRIZE 1: ${p1 || "XXXX"}\nPRIZE 2: ${p2 || "XXXX"}\nPRIZE 3: ${p3 || "XXXX"}\nSHIO : ${shio}\nSelamat Kepada Pemenang, Salam JP`;
        } else {
            const rs = document.getElementById('p-single').value || "";
            shio = getShioFromNumber(rs);
            document.getElementById('in-shio').value = shio;
            out = `Hasil Pengeluaran ${nama}\n${tglString}\nResult :  ${rs || "XXXX"}\nSHIO    : ${shio}\nSelamat Kepada Pemenang, Salam JP`;
        }
        document.getElementById('gen-output').value = out;
    }

    function openM(no, nama) {
        document.getElementById('activeNo').value = no;
        document.getElementById('modalPasaranName').innerText = nama;
        document.getElementById('modalInput').style.display = "block";
        setTimeout(() => document.getElementById('mValSingle').focus(), 100);
    }

    function closeM() { document.getElementById('modalInput').style.display = "none"; }
    
    function toggleModalFields() {
        const mode = document.getElementById('modalMode').value;
        document.getElementById('field1').style.display = mode === '1' ? 'block' : 'none';
        document.getElementById('field3').style.display = mode === '3' ? 'block' : 'none';
    }

    function saveM() {
        const no = document.getElementById('activeNo').value;
        const mode = document.getElementById('modalMode').value;
        let finalVal = mode === '1' ? (document.getElementById('mValSingle').value || "-") : 
            (document.getElementById('mValP1').value || "0000") + "/" + (document.getElementById('mValP2').value || "0000") + "/" + (document.getElementById('mValP3').value || "0000");

        let savedSts = JSON.parse(localStorage.getItem('ziatogel_status') || '{}');
        let savedRes = JSON.parse(localStorage.getItem('ziatogel_results') || '{}');
        savedSts[no] = "DONE"; savedRes[no] = finalVal;
        localStorage.setItem('ziatogel_status', JSON.stringify(savedSts));
        localStorage.setItem('ziatogel_results', JSON.stringify(savedRes));
        renderTable(); closeM();
    }

    function resetSingle(no) {
        if(!confirm("Reset data pasaran ini saja?")) return;
        let savedSts = JSON.parse(localStorage.getItem('ziatogel_status') || '{}');
        let savedRes = JSON.parse(localStorage.getItem('ziatogel_results') || '{}');
        delete savedSts[no]; delete savedRes[no];
        localStorage.setItem('ziatogel_status', JSON.stringify(savedSts));
        localStorage.setItem('ziatogel_results', JSON.stringify(savedRes));
        renderTable();
    }

    function resetAllData() {
        if(confirm("Hapus semua status DONE dan angka Result?")) {
            localStorage.removeItem('ziatogel_status'); localStorage.removeItem('ziatogel_results');
            renderTable(); alert("Data berhasil di-reset!");
        }
    }

    function copyResult() {
    const textOutput = document.getElementById('gen-output');
    
    // 1. Cek apakah ada teks yang mau di-copy
    if (!textOutput.value || textOutput.value.trim() === "") {
        alert("Isi data pasaran dulu, Bang!");
        return;
    }

    // 2. Metode Modern (Navigator API)
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(textOutput.value).then(() => {
            updateCopyButton();
        }).catch(err => {
            // Jika gagal, lari ke metode cadangan (fallback)
            fallbackCopy(textOutput);
        });
    } else {
        // 3. Metode Cadangan (untuk Browser Jadul / Non-HTTPS)
        fallbackCopy(textOutput);
    }
}

// Fungsi cadangan agar lebih "bandel" di semua HP
function fallbackCopy(element) {
    element.select();
    element.setSelectionRange(0, 99999); // Untuk mobile
    try {
        document.execCommand('copy');
        updateCopyButton();
    } catch (err) {
        alert("Gagal copy otomatis. Silakan salin manual, Bang.");
    }
}

// Efek visual tombol setelah berhasil
function updateCopyButton() {
    const btn = document.querySelector('.btn-copy');
    const originalText = btn.innerHTML;
    
    btn.style.background = "var(--green)";
    btn.style.color = "#000";
    btn.innerText = "✅ BERHASIL DI COPY!";
    
    setTimeout(() => {
        btn.style.background = ""; // Balik ke warna semula
        btn.style.color = "";
        btn.innerText = "🚀 COPY UNTUK SHARE";
    }, 2000);
}

    function goHome() { 
        document.getElementById('monitor-area').classList.remove('active'); 
        document.querySelectorAll('.btn-sesi').forEach(b => b.classList.remove('active')); 
    }

    document.getElementById('in-tgl').value = new Date().toLocaleDateString('id-ID');
    setInterval(() => { 
        const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
        const now = new Date();
        const clockEl = document.getElementById('clock');
        if(clockEl) clockEl.innerText = `${days[now.getDay()]} - ${now.toLocaleTimeString('id-ID').replace(/:/g, '.')}`; 
    }, 1000);

    const sTable = document.getElementById('shio-table-body');
    if(sTable) {
        sTable.innerHTML = shioList.map((s, i) => `<tr style="background:${i%2===0?'var(--shio-blue)':'var(--shio-gold)'}"><td style="width:25%; font-weight:bold; text-align:center; color:${i%2===0?'var(--neon)':'var(--gold)'}">${s.n}</td><td style="text-align:left; padding-left:10px; font-family:monospace;">${s.v.map(v => v.toString().padStart(2, '0')).join(', ')}</td></tr>`).join('');
    }

    ['mValSingle','mValP1','mValP2','mValP3'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.onkeydown = (e) => { 
            if (e.key === "Enter") { e.preventDefault(); saveM(); }
            if (e.key === "Escape") closeM();
        };
    });
    // ATUR AUTO REFRESH TABEL SETIAP 1 MENIT
setInterval(() => {
    console.log("Sistem mengecek jadwal terupdate...");
    
    // Memanggil ulang fungsi renderTable agar label NEXT pindah otomatis
    renderTable(); 
    
    // Opsional: Jika Abang punya fungsi update jam digital di dashboard
    // updateClock(); 
}, 60000); // 60000 milidetik = 1 Menit
function resetGenerator() {
    // 1. Kosongkan semua input di panel kanan
    document.getElementById('in-nama').value = "";
    document.getElementById('p1').value = "";
    document.getElementById('p2').value = "";
    document.getElementById('p3').value = "";
    document.getElementById('p-single').value = "";
    document.getElementById('in-shio').value = "AUTO";
    document.getElementById('gen-output').value = "";

    // 2. Beri fokus kembali ke Nama Pasaran agar bisa langsung ngetik
    document.getElementById('in-nama').focus();
    
    // Efek visual singkat pada tombol reset (opsional)
    const btnReset = document.querySelector('.btn-reset-gen');
    btnReset.innerText = "Selesai!";
    setTimeout(() => { btnReset.innerText = "♻️ RESET"; }, 1000);
}
